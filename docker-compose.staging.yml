services:
  webserver:
    container_name: belvedereapp-staging
    build:
      context: .
      dockerfile: Dockerfile
    image: thebelvedereglacier-webserver-staging:latest
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      DBHOST: ${DBHOST}
      DBNAME: ${DBNAME}
      DBUSERNAME: ${DBUSERNAME}
      DBPORT: ${DBPORT}
      DBSSLMODE: ${DBSSLMODE}
      DBPASSWORD: ${DBPASSWORD}